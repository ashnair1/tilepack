[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "tms_packager"
version = "0.1.0"
description = "Convert TMS tile folders to MBTiles/PMTiles and serve them as TMS endpoints"
requires-python = ">=3.11"
dependencies = [
    "click>=8.0",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "pmtiles>=3.4",
    "httpx>=0.27",
]

[project.scripts]
tms_packager = "tms_packager.cli:cli"

[tool.setuptools.packages.find]
include = ["tms_packager*"]
